<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="icon-title icon-desc">
  <title id="icon-title">ulpExtractor</title>
  <desc id="icon-desc">Boundary gate extraction icon — U-shaped bracket with scanning beams and amber separator dots for credential parsing</desc>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142438"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00A8CC"/>
    </linearGradient>
    <linearGradient id="beam-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="60%" stop-color="#00BCD8"/>
      <stop offset="100%" stop-color="#0098B0" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#bg-grad)"/>
  <rect x="16.5" y="16.5" width="223" height="223" rx="47.5" ry="47.5" fill="none" stroke="#00D4FF" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- U-Bracket: boundary gate, open on the right -->
  <path d="M 180 64 L 64 64 L 64 192 L 180 192" fill="none" stroke="url(#cyan-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Extraction beams — three graduated widths -->
  <rect x="74" y="90" width="88" height="11" rx="5.5" ry="5.5" fill="url(#beam-grad)"/>
  <rect x="74" y="118" width="108" height="11" rx="5.5" ry="5.5" fill="url(#beam-grad)"/>
  <rect x="74" y="146" width="94" height="11" rx="5.5" ry="5.5" fill="url(#beam-grad)"/>

  <!-- Amber colon separator dots -->
  <circle cx="192" cy="108" r="5" fill="#FFB347"/>
  <circle cx="192" cy="136" r="5" fill="#FFB347"/>

  <!-- Subtle corner accents — boundary character references (. @ / :) -->
  <g stroke="#00D4FF" stroke-width="1" stroke-linecap="round" opacity="0.15">
    <path d="M 66 76 L 66 82 M 66 76 L 72 76"/>
    <path d="M 184 68 L 190 68 M 190 68 L 190 74"/>
    <path d="M 66 180 L 66 186 M 66 186 L 72 186"/>
    <path d="M 190 180 L 190 186 M 184 186 L 190 186"/>
  </g>
</svg>
