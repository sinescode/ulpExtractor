<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 256 256"
     width="256" height="256"
     role="img"
     aria-labelledby="icon-title icon-desc">

  <title id="icon-title">ulpExtractor</title>
  <desc id="icon-desc">Extractor gem — a faceted diamond mark representing credential extraction</desc>

  <defs>
    <!-- Icon background -->
    <radialGradient id="bg" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#1A2535"/>
      <stop offset="100%" stop-color="#0A0F18"/>
    </radialGradient>

    <!-- Diamond top facet — lighter cyan (light hitting the crown) -->
    <linearGradient id="gem-top" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00E0FF"/>
      <stop offset="100%" stop-color="#00B8D8"/>
    </linearGradient>

    <!-- Diamond bottom facet — deeper teal -->
    <linearGradient id="gem-bot" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00B8D8"/>
      <stop offset="100%" stop-color="#006680"/>
    </linearGradient>

    <!-- Extraction spark glow -->
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB347" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FF6B4A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6B4A" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass highlight -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#fff" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.06"/>
    </linearGradient>

    <!-- Subtle shadow -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="135%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Spark glow -->
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Container -->
  <rect x="24" y="24" width="208" height="208" rx="48" ry="48"
        fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle inner border -->
  <rect x="25" y="25" width="206" height="206" rx="47" ry="47"
        fill="none" stroke="#fff" stroke-width="0.5" opacity="0.05"/>

  <!-- === THE GEM === -->
  <!-- Top facet — light-catching crown -->
  <!-- Points: top(128,62), right(178,138), left(78,138) -->
  <path d="M 128,62 L 178,138 L 128,138 L 78,138 Z"
        fill="url(#gem-top)"/>

  <!-- Bottom facet — deeper body -->
  <!-- Points: left(78,138), right(178,138), bottom(128,190) -->
  <path d="M 78,138 L 178,138 L 128,190 Z"
        fill="url(#gem-bot)"/>

  <!-- Facet edge highlight -->
  <line x1="78" y1="138" x2="178" y2="138"
        stroke="#fff" stroke-width="0.6" opacity="0.15"/>

  <!-- Inner glow behind spark -->
  <circle cx="128" cy="182" r="18" fill="url(#spark)" opacity="0.5"/>

  <!-- The extraction spark -->
  <circle cx="128" cy="184" r="5" fill="#FFB347" filter="url(#glow)"/>

  <!-- Spark highlight -->
  <circle cx="127" cy="182.5" r="1.8" fill="#fff" opacity="0.6"/>

  <!-- Glass overlay -->
  <rect x="24" y="24" width="208" height="208" rx="48" ry="48" fill="url(#glass)"/>

</svg>
