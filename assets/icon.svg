<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="icon-title icon-desc">
  <title id="icon-title">ulpExtractor</title>
  <desc id="icon-desc">Extraction gate icon — boundary-aware domain_end() matching for identifier:user:password credential parsing. A U-shaped boundary bracket with three graduated extraction beams and amber colon separators.</desc>

  <defs>
    <!-- Deep navy background — radiates from slightly above center for a natural lighting effect -->
    <radialGradient id="bg" cx="0.5" cy="0.32" r="0.68" fx="0.45" fy="0.25">
      <stop offset="0%" stop-color="#1A3450" />
      <stop offset="38%" stop-color="#122438" />
      <stop offset="100%" stop-color="#060A10" />
    </radialGradient>

    <!-- Ambient inner glow — soft cyan light from within the badge -->
    <radialGradient id="inner-glow" cx="0.5" cy="0.48" r="0.55">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.08" />
      <stop offset="55%" stop-color="#00D4FF" stop-opacity="0.025" />
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0" />
    </radialGradient>

    <!-- Bracket gradient — electric cyan with deeper right edge for depth -->
    <linearGradient id="bracket" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF" />
      <stop offset="85%" stop-color="#00BCD8" />
      <stop offset="100%" stop-color="#0098B0" />
    </linearGradient>

    <!-- Extraction beam gradient — bright left origin fading toward the extraction point -->
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.95" />
      <stop offset="72%" stop-color="#00D4FF" stop-opacity="0.9" />
      <stop offset="92%" stop-color="#00C0E0" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#00B0C8" stop-opacity="0.15" />
    </linearGradient>

    <!-- Colon dot glow — soft amber radiance -->
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Bracket cyan lift — very faint glow under the bracket -->
    <filter id="bracket-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#00D4FF" flood-opacity="0.18" />
    </filter>

    <!-- Outer badge shadow — multi-layer for premium depth -->
    <filter id="outer-shadow" x="-30%" y="-30%" width="160%" height="165%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.18" />
    </filter>

    <!-- Glass highlight overlay — top-down sheen -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.07" />
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.015" />
      <stop offset="70%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.06" />
    </linearGradient>
  </defs>

  <g id="icon">
    <!-- Badge background with depth -->
    <rect fill="#000000" opacity="0.18" x="18" y="20" width="220" height="220" rx="52" ry="52" />
    <rect fill="url(#bg)" x="16" y="16" width="224" height="224" rx="52" ry="52" filter="url(#outer-shadow)" />
    <rect fill="none" stroke="#00D4FF" stroke-width="0.6" stroke-opacity="0.06" x="16.5" y="16.5" width="223" height="223" rx="51.5" ry="51.5" />

    <!-- Interior ambient light -->
    <circle fill="url(#inner-glow)" cx="128" cy="128" r="84" />

    <!-- ===== BOUNDARY GATE (U-Bracket) ===== -->
    <!-- Open on the right: represents domain_end() validating boundary characters
         Three-sided path with rounded joins at corners and rounded open ends -->
    <g filter="url(#bracket-glow)">
      <path d="M 184 72 L 72 72 L 72 184 L 184 184"
            fill="none" stroke="url(#bracket)" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- ===== EXTRACTION BEAMS ===== -->
    <!-- Three graduated horizontal bars inside the bracket, representing
         the three extracted fields: identifier, user, password.
         Different lengths = different extracted data sizes.
         Right-end fade suggests data flowing past the visible extraction point. -->

    <!-- Beam 1 (top) — identifier/source -->
    <rect x="82" y="97" width="84" height="10" rx="5" ry="5" fill="url(#beam)" />

    <!-- Beam 2 (middle) — user (longest, primary extraction target) -->
    <rect x="82" y="123" width="106" height="10" rx="5" ry="5" fill="url(#beam)" />

    <!-- Beam 3 (bottom) — password -->
    <rect x="82" y="149" width="92" height="10" rx="5" ry="5" fill="url(#beam)" />

    <!-- ===== COLON SEPARATORS ===== -->
    <!-- Two amber dots in the gaps between beams, positioned past the bracket opening.
         Each dot represents a ':' separator between identifier:user:password.
         Their position outside the bracket signifies the point where extracted data
         passes through the boundary into structured output. -->

    <circle cx="196" cy="115" r="4.5" fill="#FFB347" filter="url(#dot-glow)" />
    <circle cx="196" cy="141" r="4.5" fill="#FFB347" filter="url(#dot-glow)" />

    <!-- ===== SUBTLE CORNER ANCHORS ===== -->
    <!-- Micro detail: tiny corner markers referencing the four boundary characters
         (. @ / :) that domain_end() checks. Nearly invisible but adds algorithmic depth. -->
    <g stroke="#00D4FF" stroke-width="1.2" stroke-linecap="round" opacity="0.12">
      <!-- Top-left: '.' reference -->
      <path d="M 69 74 L 69 80 M 69 74 L 75 74" />
      <!-- Top-right: '/' reference -->
      <path d="M 182 69 L 188 69 M 187 69 L 187 75" />
      <!-- Bottom-left: '@' reference -->
      <path d="M 69 182 L 69 188 M 69 188 L 75 188" />
      <!-- Bottom-right: ':' reference -->
      <path d="M 187 182 L 187 188 M 182 187 L 188 187" />
    </g>

    <!-- Glass highlight overlay -->
    <rect fill="url(#glass)" x="16" y="16" width="224" height="224" rx="52" ry="52" />
  </g>
</svg>
