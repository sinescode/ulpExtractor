<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 256 256"
     width="256" height="256"
     role="img"
     aria-labelledby="icon-title icon-desc">

  <title id="icon-title">ulpExtractor</title>
  <desc id="icon-desc">Data extraction prism — geometric mark for the ulpExtractor credential extraction tool</desc>

  <defs>
    <!-- Background: deep navy radial -->
    <radialGradient id="bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#152233"/>
      <stop offset="100%" stop-color="#0A0F18"/>
    </radialGradient>

    <!-- Brand cyan gradient -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0088AA"/>
    </linearGradient>

    <!-- Brand lighter for inner elements -->
    <linearGradient id="brand-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#33E0FF"/>
      <stop offset="100%" stop-color="#00B8D8"/>
    </linearGradient>

    <!-- Amber/gold accent for the extracted core -->
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="30%" stop-color="#FFB347"/>
      <stop offset="70%" stop-color="#FF6B4A"/>
      <stop offset="100%" stop-color="#E83A2A"/>
    </radialGradient>

    <!-- Center glow -->
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#FFB347" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6B4A" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner ambient glow behind hex ring -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#00D4FF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass dome overlay -->
    <radialGradient id="glass" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.00"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.08"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Core glow filter -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for hex ring -->
    <filter id="hex-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== OUTER CONTAINER ===== -->
  <circle cx="128" cy="128" r="112" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle outer ring -->
  <circle cx="128" cy="128" r="111" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.06"/>

  <!-- Inner ambient glow -->
  <circle cx="128" cy="128" r="90" fill="url(#ambient)"/>

  <!-- ===== PRECISION CROSSHAIR RING ===== -->
  <circle cx="128" cy="128" r="62" fill="none" stroke="url(#brand)" stroke-width="0.5" opacity="0.18" stroke-dasharray="3,8"/>

  <!-- ===== HEXAGONAL RING (precision filter) ===== -->
  <!-- Flat-top hexagon centered at (128,128), radius 68 -->
  <!-- cos30=0.866, sin30=0.5, 68*0.866=58.9, 68*0.5=34 -->
  <polygon points="128,94 186.9,128 186.9,162 128,196 69.1,162 69.1,128"
           fill="none" stroke="url(#brand)" stroke-width="1.2"
           opacity="0.55" filter="url(#hex-glow)"/>

  <!-- Outer ghost hex (slightly larger, lower opacity) -->
  <polygon points="128,82 194.8,121 194.8,163 128,202 61.2,163 61.2,121"
           fill="none" stroke="url(#brand)" stroke-width="0.5"
           opacity="0.18"/>

  <!-- ===== RADIAL CONVERGENCE LINES (data streams focusing inward) ===== -->
  <g stroke="url(#brand)" stroke-width="0.8" opacity="0.35" stroke-linecap="round">
    <!-- From hex vertices to center -->
    <line x1="128" y1="94" x2="128" y2="146"/>
    <line x1="186.9" y1="128" x2="146" y2="128"/>
    <line x1="186.9" y1="162" x2="146" y2="140"/>
    <line x1="128" y1="196" x2="128" y2="154"/>
    <line x1="69.1" y1="162" x2="110" y2="140"/>
    <line x1="69.1" y1="128" x2="110" y2="128"/>
  </g>

  <!-- Secondary thinner radial lines (midpoints of hex edges → center) -->
  <g stroke="url(#brand)" stroke-width="0.4" opacity="0.18">
    <!-- Midpoints of hex edges: top-right, bottom-right, bottom-left, top-left, plus top/bottom already covered -->
    <line x1="157.5" y1="111" x2="139" y2="131"/>
    <line x1="157.5" y1="145" x2="139" y2="135"/>
    <line x1="98.5" y1="145" x2="117" y2="135"/>
    <line x1="98.5" y1="111" x2="117" y2="131"/>
  </g>

  <!-- ===== CENTER GLOW FIELD ===== -->
  <circle cx="128" cy="144" r="32" fill="url(#center-glow)"/>

  <!-- ===== EXTRACTION DIAMOND (the filter core) ===== -->
  <!-- A 4-pointed diamond, slightly elongated vertically -->
  <path d="M 128,118 L 149,144 L 128,170 L 107,144 Z"
        fill="none" stroke="url(#brand-light)" stroke-width="1.6"
        stroke-linejoin="round" opacity="0.9"/>

  <!-- Diamond inner facet — bottom half darker -->
  <path d="M 128,144 L 149,144 L 128,170 L 107,144 Z"
        fill="url(#brand)" opacity="0.15"/>

  <!-- Diamond inner facet — top half -->
  <path d="M 128,118 L 149,144 L 128,144 L 107,144 Z"
        fill="url(#brand-light)" opacity="0.10"/>

  <!-- ===== EXTRACTED NODE (the result) ===== -->
  <!-- Outer glow rings -->
  <circle cx="128" cy="165" r="14" fill="url(#center-glow)" opacity="0.5"/>
  <circle cx="128" cy="165" r="8" fill="url(#core)" opacity="0.3" filter="url(#glow)"/>

  <!-- The core node -->
  <circle cx="128" cy="165" r="5" fill="url(#core)" filter="url(#glow)"/>

  <!-- Bright center highlight -->
  <circle cx="127" cy="163.5" r="1.8" fill="#fff" opacity="0.7"/>

  <!-- ===== TOP DATA PARTICLES (input streams) ===== -->
  <!-- 3 small dots above the hex, suggesting data flowing in -->
  <circle cx="96" cy="72" r="2.2" fill="url(#brand)" opacity="0.45"/>
  <circle cx="128" cy="64" r="2.8" fill="url(#brand-light)" opacity="0.55"/>
  <circle cx="160" cy="72" r="2.2" fill="url(#brand)" opacity="0.45"/>

  <!-- Tiny particle trails -->
  <circle cx="112" cy="82" r="1.3" fill="url(#brand)" opacity="0.25"/>
  <circle cx="144" cy="82" r="1.3" fill="url(#brand)" opacity="0.25"/>

  <!-- ===== GLASS DOME ===== -->
  <circle cx="128" cy="128" r="112" fill="url(#glass)"/>

  <!-- ===== BOTTOM EXTRACTION TRAIL ===== -->
  <!-- Small particles below the core node — extracted data drops -->
  <circle cx="128" cy="188" r="1.4" fill="url(#core)" opacity="0.35"/>
  <circle cx="128" cy="196" r="0.9" fill="url(#core)" opacity="0.2"/>

</svg>
