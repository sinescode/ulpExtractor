<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#2C8B84"/>
    </linearGradient>
  </defs>

  <!-- Gear icon -->
  <g transform="translate(60,80)" fill="none" stroke="url(#g)" stroke-width="3">
    <circle cx="0" cy="0" r="28"/>
    <circle cx="0" cy="0" r="10" fill="url(#g)"/>
    <!-- Gear teeth -->
    <rect x="-6" y="-42" width="12" height="12" rx="3" fill="url(#g)"/>
    <rect x="-6" y="30" width="12" height="12" rx="3" fill="url(#g)"/>
    <rect x="-42" y="-6" width="12" height="12" rx="3" fill="url(#g)"/>
    <rect x="30" y="-6" width="12" height="12" rx="3" fill="url(#g)"/>
    <rect x="21" y="21" width="12" height="12" rx="3" fill="url(#g)" transform="rotate(45,27,27)"/>
    <rect x="-33" y="-33" width="12" height="12" rx="3" fill="url(#g)" transform="rotate(45,-27,-27)"/>
    <rect x="21" y="-33" width="12" height="12" rx="3" fill="url(#g)" transform="rotate(-45,27,-27)"/>
    <rect x="-33" y="21" width="12" height="12" rx="3" fill="url(#g)" transform="rotate(-45,-27,27)"/>
  </g>

  <!-- Arrow/funnel -->
  <g transform="translate(120,80)" fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round">
    <path d="M0,-20 L30,0 L0,20"/>
    <line x1="5" y1="0" x2="30" y2="0"/>
  </g>

  <!-- Text -->
  <text x="180" y="68" font-family="JetBrains Mono, monospace" font-size="42" font-weight="700" fill="url(#g)">ulpExtractor</text>
  <text x="182" y="96" font-family="JetBrains Mono, monospace" font-size="14" font-weight="400" fill="#8B949E">domain credential extractor // rust powered</text>

  <!-- Bottom accent line -->
  <line x1="180" y1="110" x2="500" y2="110" stroke="url(#g)" stroke-width="2" opacity="0.4"/>
</svg>
