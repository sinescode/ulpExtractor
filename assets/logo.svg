<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" width="540" height="140" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">ulpExtractor</title>
  <desc id="logo-desc">ulpExtractor — high-performance Rust CLI for boundary-aware credential extraction. Horizontal logo with extraction gate icon and wordmark.</desc>

  <defs>
    <linearGradient id="cyan-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00A8CC"/>
    </linearGradient>
    <linearGradient id="beam-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="70%" stop-color="#00BCD8"/>
      <stop offset="100%" stop-color="#0098B0" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="e-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0098B0"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (scaled down) -->
  <g transform="translate(16, 28) scale(0.36)">
    <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="#0A1628"/>
    <rect x="16.5" y="16.5" width="223" height="223" rx="47.5" ry="47.5" fill="none" stroke="#00D4FF" stroke-width="0.6" stroke-opacity="0.15"/>

    <path d="M 180 64 L 64 64 L 64 192 L 180 192" fill="none" stroke="url(#cyan-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="74" y="90" width="88" height="11" rx="5.5" ry="5.5" fill="url(#beam-grad)"/>
    <rect x="74" y="118" width="108" height="11" rx="5.5" ry="5.5" fill="url(#beam-grad)"/>
    <rect x="74" y="146" width="94" height="11" rx="5.5" ry="5.5" fill="url(#beam-grad)"/>

    <circle cx="192" cy="108" r="5" fill="#FFB347"/>
    <circle cx="192" cy="136" r="5" fill="#FFB347"/>
  </g>

  <!-- Divider -->
  <line x1="124" y1="38" x2="124" y2="102" stroke="#00D4FF" stroke-width="0.7" stroke-opacity="0.18" stroke-linecap="round"/>

  <!-- Wordmark -->
  <!-- "ulp" — lightweight, muted -->
  <text x="140" y="82" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="22" fill="#0098B0" letter-spacing="2">ulp</text>

  <!-- Custom "E" built from extraction beam motif -->
  <g transform="translate(194, 50)">
    <rect x="0" y="0" width="7" height="34" rx="3" ry="3" fill="url(#e-grad)"/>
    <rect x="0" y="2" width="26" height="7" rx="3.5" ry="3.5" fill="url(#e-grad)"/>
    <rect x="0" y="15" width="36" height="7" rx="3.5" ry="3.5" fill="url(#e-grad)"/>
    <rect x="0" y="27" width="30" height="7" rx="3.5" ry="3.5" fill="url(#e-grad)"/>
    <!-- Amber dots between E arms -->
    <circle cx="44" cy="12" r="3" fill="#FFB347"/>
    <circle cx="44" cy="25" r="3" fill="#FFB347"/>
  </g>

  <!-- "xtractor" — bold, dark -->
  <text x="254" y="82" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="26" fill="#0A1628" letter-spacing="-0.3">xtractor</text>

  <!-- Tagline -->
  <text x="140" y="114" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="9" fill="#6B7B8D" letter-spacing="3.5">BOUNDARY-AWARE CREDENTIAL EXTRACTION</text>
</svg>
